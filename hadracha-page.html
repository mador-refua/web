<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://*.google.com https://*.googleusercontent.com https://script.google.com https://script.googleusercontent.com; frame-src https://drive.google.com;">

    <meta name="description" content="חומרי הדרכה למדריכים - מדור רפואה, פיקוד העורף">
    <link rel="icon" type="image/png" href="Assets/logo1.PNG">
    <link rel="apple-touch-icon" href="Assets/logo1.PNG">
    <meta name="theme-color" content="#1a1d23">
    <meta name="apple-mobile-web-app-title" content="מדור רפואה">

    <title>הדרכה | מדור רפואה</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Theme System -->

    <style>
        :root {
            --orange-primary: #FF6B35;
            --orange-bright: #FF8C42;
            --orange-dark: #E85A24;
            --orange-glow: rgba(255, 107, 53, 0.4);
            --charcoal: #1a1d23;
            --charcoal-light: #252931;
            --charcoal-lighter: #2f343d;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --success: #22c55e;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.1);
            /* Instructor accent — purple/indigo to distinguish from student content */
            --instructor-primary: #818cf8;
            --instructor-dark: #6366f1;
            --instructor-glow: rgba(129, 140, 248, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--charcoal);
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .bg-image {
            position: fixed;
            inset: 0;
            background: url('Assets/background.webp') center center / cover no-repeat;
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(26, 29, 35, 0.85) 0%, rgba(26, 29, 35, 0.75) 30%, rgba(26, 29, 35, 0.85) 70%, rgba(26, 29, 35, 0.98) 100%),
                linear-gradient(135deg, rgba(129, 140, 248, 0.07) 0%, transparent 50%);
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 90px;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(26, 29, 35, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .back-btn:hover {
            border-color: var(--instructor-primary);
            color: var(--instructor-primary);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .header-title-group {
            display: flex;
            flex-direction: column;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .page-subtitle {
            font-size: 0.72rem;
            color: var(--instructor-primary);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logos {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logos img {
            height: 30px;
            width: auto;
        }

        .header-logos picture img {
            height: 30px;
            width: auto;
        }

        /* Instructor badge in header */
        .instructor-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: rgba(129, 140, 248, 0.12);
            border: 1px solid rgba(129, 140, 248, 0.25);
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--instructor-primary);
        }

        .instructor-badge i {
            font-size: 0.7rem;
        }

        /* ===== SEARCH ===== */
        .search-section {
            padding: 12px 16px 8px;
            position: sticky;
            top: 67px;
            z-index: 99;
            background: linear-gradient(180deg, rgba(26, 29, 35, 0.95) 0%, rgba(26, 29, 35, 0.8) 80%, transparent 100%);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--charcoal-light);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 10px 14px;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--instructor-primary);
            box-shadow: 0 0 0 3px var(--instructor-glow);
        }

        .search-box i {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: 'Heebo', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: none;
            font-size: 0.9rem;
        }

        .search-clear.show {
            display: block;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px 12px;
        }

        .item-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .item-count strong {
            color: var(--instructor-primary);
        }

        .view-toggle {
            display: flex;
            gap: 4px;
        }

        .toggle-btn {
            width: 32px;
            height: 32px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .toggle-btn.active {
            background: var(--instructor-primary);
            border-color: var(--instructor-primary);
            color: white;
        }

        /* ===== REFRESH BUTTON ===== */
        .refresh-btn {
            width: 32px;
            height: 32px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .refresh-btn:hover {
            border-color: var(--instructor-primary);
            color: var(--instructor-primary);
        }

        .refresh-btn:active {
            transform: scale(0.92);
        }

        .refresh-btn.spinning i {
            animation: spin 0.7s linear infinite;
        }

        .cache-age {
            font-size: 0.7rem;
            color: var(--text-muted);
            align-self: center;
        }

        .stats-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== CATEGORY TABS ===== */
        .category-section {
            padding: 0 16px 12px;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 4px 0;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            flex-shrink: 0;
            padding: 8px 16px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Heebo', sans-serif;
        }

        .category-tab:active {
            transform: scale(0.97);
        }

        .category-tab.active {
            background: linear-gradient(135deg, var(--instructor-primary), var(--instructor-dark));
            border-color: transparent;
            color: white;
        }

        .category-tab .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* ===== CONTENT ===== */
        .content {
            padding: 0 16px 20px;
        }

        /* Grid view */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .items-grid.list-view {
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* Material Card */
        .material-card {
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .material-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--instructor-primary), var(--instructor-dark));
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .material-card:hover {
            transform: translateY(-3px);
            border-color: rgba(129, 140, 248, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(129, 140, 248, 0.1);
        }

        .material-card:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .material-card:active {
            transform: scale(0.98);
            border-color: var(--instructor-primary);
        }

        .material-card-inner {
            padding: 16px 14px;
        }

        .material-emoji {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: block;
        }

        .material-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .material-card:hover .material-title {
            color: var(--instructor-primary);
        }

        .material-type {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            color: var(--instructor-primary);
            font-weight: 600;
        }

        .material-type i {
            font-size: 0.65rem;
        }

        /* Type badge (PDF / VIDEO / DOC) */
        .type-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 3px 7px;
            border-radius: 5px;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .type-badge.pdf {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .type-badge.video {
            background: linear-gradient(135deg, var(--instructor-primary), var(--instructor-dark));
            color: white;
        }

        .type-badge.doc {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .type-badge.link {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        /* List view card */
        .items-grid.list-view .material-card-inner {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
        }

        .items-grid.list-view .material-emoji {
            font-size: 1.8rem;
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .items-grid.list-view .material-content {
            flex: 1;
            min-width: 0;
        }

        .items-grid.list-view .material-title {
            margin-bottom: 4px;
            -webkit-line-clamp: 1;
            line-clamp: 1;
        }

        .items-grid.list-view .type-badge {
            position: static;
            margin-top: 6px;
            display: inline-block;
        }

        .items-grid.list-view .material-type {
            display: none;
        }

        /* ===== EMPTY / ERROR / LOADING ===== */
        .loading-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--charcoal-lighter);
            border-top: 4px solid var(--instructor-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: #fca5a5;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 29, 35, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            min-width: 52px;
        }

        .bottom-nav-item i {
            font-size: 1.15rem;
            transition: all 0.3s ease;
        }

        .bottom-nav-item.active {
            color: var(--orange-primary);
        }

        .bottom-nav-item.active.instructor-tab {
            color: var(--instructor-primary);
        }

        .bottom-nav-item.active i {
            transform: scale(1.1);
        }

        .bottom-nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--orange-primary);
            border-radius: 0 0 3px 3px;
        }

        .bottom-nav-item.active.instructor-tab::before {
            background: var(--instructor-primary);
        }

        .bottom-nav-item:not(.active):active {
            color: var(--orange-primary);
            transform: scale(0.95);
        }


        @media (max-width: 380px) {
            .header {
                padding: 12px 14px;
            }

            .page-title {
                font-size: 1.1rem;
            }

            .header-logos picture img {
                height: 26px;
            }

            .search-section {
                padding: 10px 14px 6px;
            }

            .category-section {
                padding: 0 14px 10px;
            }

            .content {
                padding: 0 14px 16px;
            }

            .items-grid {
                gap: 10px;
            }

            .material-card-inner {
                padding: 14px 12px;
            }

            .material-emoji {
                font-size: 1.8rem;
            }

            .material-title {
                font-size: 0.85rem;
            }

            .bottom-nav-item {
                min-width: 44px;
                font-size: 0.6rem;
                padding: 6px 4px;
            }

            .bottom-nav-item i {
                font-size: 1.05rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="main-container">
        <header class="header">
            <div class="header-right">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div class="header-title-group">
                    <h1 class="page-title">חומרי הדרכה</h1>
                    <span class="page-subtitle">אזור מדריכים</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="instructor-badge">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>מדריכים</span>
                </div>
                <div class="header-logos">
                    <picture>
                        <source srcset="Assets/logo1.webp" type="image/webp"><img src="Assets/logo1_small.PNG"
                            alt="Logo 1">
                    </picture>
                    <picture>
                        <source srcset="Assets/logo2.webp" type="image/webp"><img src="Assets/logo2_small.PNG"
                            alt="Logo 2">
                    </picture>
                </div>
            </div>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="חיפוש חומר הדרכה...">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Stats & View Toggle -->
        <div class="stats-bar">
            <div class="item-count" id="itemCount"><strong>0</strong> חומרים</div>
            <div class="stats-right">
                <span class="cache-age" id="cacheAge"></span>
                <button class="refresh-btn" id="refreshBtn" onclick="forceRefresh()" title="ריענון">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <div class="view-toggle">
                    <button class="toggle-btn active" id="gridBtn" onclick="setView('grid')">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button class="toggle-btn" id="listBtn" onclick="setView('list')">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-section">
            <div class="category-tabs" id="categoryTabs"></div>
        </div>

        <div class="content">
            <!-- Loading -->
            <div id="loadingScreen" class="loading-screen">
                <div class="loading-spinner"></div>
                <div class="loading-text">טוען חומרי הדרכה...</div>
            </div>

            <!-- Error -->
            <div id="errorScreen" style="display: none;">
                <div class="error-message">
                    <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
                    <div id="errorText">שגיאה בטעינת חומרי ההדרכה</div>
                    <button onclick="loadMaterials()"
                        style="margin-top:14px;padding:10px 20px;background:var(--instructor-primary);color:white;border:none;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:600;font-size:0.9rem;">נסה
                        שוב</button>
                </div>
            </div>

            <!-- Items Grid -->
            <div class="items-grid" id="itemsGrid" style="display: none;"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">🔍</div>
                <div class="empty-title">לא נמצאו תוצאות</div>
                <div class="empty-text">נסה לחפש משהו אחר</div>
            </div>
        </div>
    </div>

    <script>
        // =====================================================================
        // CONFIGURATION — Replace with your actual Google Apps Script URL
        // after setting up the "הדרכה" sheet (see setup instructions below)
        // =====================================================================
        const MATERIALS_URL = 'https://script.google.com/macros/s/AKfycbynCRZI-tpmArylHh5ENmtX2rppD43JMnxaGOiBHloP17-7xOzQSATAYEynxxk83rvFVA/exec';
        const VIEW_KEY = 'hadracha_view';
        const CACHE_KEY = 'hadracha_cache';
        const CACHE_TIME = 'hadracha_cache_ts';
        const CACHE_TTL = 10 * 60 * 1000; // 10 minutes

        let allMaterials = [];
        let filteredMaterials = [];
        let categories = [];
        let activeCategory = 'all';
        let currentView = localStorage.getItem(VIEW_KEY) || 'grid';

        // ---- Cache helpers ----
        function saveCache(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
                localStorage.setItem(CACHE_TIME, Date.now());
            } catch (e) { } // ignore quota errors
        }
        function loadCache() {
            const ts = parseInt(localStorage.getItem(CACHE_TIME) || '0');
            if (Date.now() - ts > CACHE_TTL) return null;
            try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch (e) { return null; }
        }
        function showCacheAge() {
            const ts = parseInt(localStorage.getItem(CACHE_TIME) || '0');
            if (!ts) { document.getElementById('cacheAge').textContent = ''; return; }
            const mins = Math.round((Date.now() - ts) / 60000);
            document.getElementById('cacheAge').textContent = mins < 1 ? 'עדכני' : `לפני ${mins} דק׳`;
        }
        function forceRefresh() {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_TIME);
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            loadMaterials().finally(() => btn.classList.remove('spinning'));
        }

        // Determine badge type based on URL or explicit type field
        function getType(item) {
            if (item.type) return item.type.toLowerCase();
            const url = (item.url || '').toLowerCase();
            if (url.includes('drive.google.com') && (url.includes('.pdf') || url.includes('pdf'))) return 'pdf';
            if (url.includes('youtube.com') || url.includes('youtu.be') || url.includes('drive.google.com/file')) return 'video';
            if (url.includes('docs.google.com')) return 'doc';
            return 'link';
        }

        function getTypeBadgeLabel(type) {
            const labels = { pdf: 'PDF', video: 'וידאו', doc: 'מסמך', link: 'קישור' };
            return labels[type] || 'קישור';
        }

        function isValidUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const u = new URL(url);
                return u.protocol === 'https:' && (
                    u.hostname === 'drive.google.com' ||
                    u.hostname === 'docs.google.com' ||
                    u.hostname === 'script.google.com' ||
                    u.hostname === 'script.googleusercontent.com' ||
                    u.hostname === 'www.youtube.com' ||
                    u.hostname === 'youtube.com' ||
                    u.hostname === 'youtu.be'
                );
            } catch (e) { return false; }
        }

        async function loadMaterials() {
            document.getElementById('loadingScreen').style.display = 'block';
            document.getElementById('errorScreen').style.display = 'none';
            document.getElementById('itemsGrid').style.display = 'none';

            // Demo mode
            if (MATERIALS_URL.includes('YOUR_SCRIPT_ID_HERE')) { showDemoMode(); return; }

            // Try cache first
            const cached = loadCache();
            if (cached && cached.length > 0) {
                allMaterials = cached;
                buildCategories();
                filteredMaterials = [...allMaterials];
                document.getElementById('loadingScreen').style.display = 'none';
                initUI();
                showCacheAge();
                return;
            }

            try {
                const response = await fetch(MATERIALS_URL);
                if (!response.ok) throw new Error('שגיאת שרת');

                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'שגיאה');

                allMaterials = (data.materials || [])
                    .filter(m => m.title && m.title.trim() !== '' && m.url)
                    .filter(m => isValidUrl(m.url))
                    .map((m, i) => ({
                        id: i,
                        title: String(m.title).substring(0, 200),
                        emoji: String(m.emoji || '📋').substring(0, 10),
                        url: m.url,
                        category: String(m.category || 'כללי').substring(0, 50),
                        type: String(m.type || '').toLowerCase()
                    }));

                if (allMaterials.length === 0) throw new Error('לא נמצאו חומרי הדרכה');

                saveCache(allMaterials);
                buildCategories();
                filteredMaterials = [...allMaterials];
                document.getElementById('loadingScreen').style.display = 'none';
                initUI();
                showCacheAge();

            } catch (error) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('errorScreen').style.display = 'block';
                document.getElementById('errorText').textContent = 'לא ניתן לטעון את חומרי ההדרכה כרגע. אנא נסה שוב.';
            }
        }

        function showDemoMode() {
            // Sample data so the page looks good before the sheet is connected
            allMaterials = [
                { id: 0, title: 'מדריך הדרכת חובשים — מודל A', emoji: '📘', url: 'https://drive.google.com/', category: 'חובש', type: 'pdf' },
                { id: 1, title: 'סרטון הדגמה — חבישת פצעים', emoji: '🎬', url: 'https://drive.google.com/', category: 'חובש', type: 'video' },
                { id: 2, title: 'מצגת קורס מטב — טראומה מתקדמת', emoji: '📊', url: 'https://drive.google.com/', category: 'מטב', type: 'doc' },
                { id: 3, title: 'מאגר שאלות למדריך', emoji: '❓', url: 'https://drive.google.com/', category: 'כללי', type: 'pdf' },
                { id: 4, title: 'תכנית סילבוס קורס חובש 2026', emoji: '📅', url: 'https://drive.google.com/', category: 'חובש', type: 'doc' },
                { id: 5, title: 'הנחיות הפעלת תרגיל שד"מ', emoji: '🏋️', url: 'https://drive.google.com/', category: 'מטב', type: 'pdf' },
            ];
            buildCategories();
            filteredMaterials = [...allMaterials];
            document.getElementById('loadingScreen').style.display = 'none';

            // Show demo banner
            const banner = document.createElement('div');
            banner.style.cssText = 'margin:0 16px 16px;padding:12px 16px;background:rgba(129,140,248,0.12);border:1px solid rgba(129,140,248,0.25);border-radius:12px;font-size:0.85rem;color:var(--instructor-primary);text-align:center;';
            banner.innerHTML = '⚙️ <strong>מצב הדגמה</strong> — חבר את ה-Google Sheet כדי לטעון תוכן אמיתי';
            document.querySelector('.content').prepend(banner);

            initUI();
        }

        function buildCategories() {
            const catCount = {};
            allMaterials.forEach(m => {
                const cat = m.category || 'כללי';
                catCount[cat] = (catCount[cat] || 0) + 1;
            });
            categories = Object.entries(catCount)
                .sort((a, b) => b[1] - a[1])
                .map(([name, count]) => ({ name, count }));
        }

        function initUI() {
            renderCategories();
            setView(currentView);
            renderMaterials();
            updateCount();
            document.getElementById('searchInput').addEventListener('input', handleSearch);
        }

        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            container.textContent = '';

            const allTab = document.createElement('button');
            allTab.className = 'category-tab active';
            allTab.onclick = () => filterByCategory('all');
            allTab.dataset.category = 'all';
            allTab.innerHTML = `הכל <span class="count">${allMaterials.length}</span>`;
            container.appendChild(allTab);

            categories.forEach(cat => {
                const tab = document.createElement('button');
                tab.className = 'category-tab';
                tab.onclick = () => filterByCategory(cat.name);
                tab.dataset.category = cat.name;
                tab.innerHTML = `${cat.name} <span class="count">${cat.count}</span>`;
                container.appendChild(tab);
            });
        }

        function filterByCategory(category) {
            activeCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            applyFilters();
        }

        function handleSearch(e) {
            const query = e.target.value.trim();
            document.getElementById('searchClear').classList.toggle('show', query.length > 0);
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').classList.remove('show');
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            filteredMaterials = allMaterials.filter(m => {
                const matchCat = activeCategory === 'all' || m.category === activeCategory;
                const matchSearch = !query || m.title.toLowerCase().includes(query) ||
                    (m.category && m.category.toLowerCase().includes(query));
                return matchCat && matchSearch;
            });
            renderMaterials();
            updateCount();
        }

        function updateCount() {
            const el = document.getElementById('itemCount');
            el.innerHTML = `<strong>${filteredMaterials.length}</strong> חומרים`;
        }

        function setView(view) {
            currentView = view;
            localStorage.setItem(VIEW_KEY, view);
            document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
            document.getElementById('listBtn').classList.toggle('active', view === 'list');
            const grid = document.getElementById('itemsGrid');
            grid.classList.toggle('list-view', view === 'list');
        }

        function renderMaterials() {
            const container = document.getElementById('itemsGrid');
            const emptyState = document.getElementById('emptyState');

            container.textContent = '';

            if (filteredMaterials.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.style.display = 'grid';

            filteredMaterials.forEach((item, index) => {
                const type = getType(item);
                const card = document.createElement('div');
                card.className = 'material-card';
                card.style.animation = `fadeIn 0.4s ease-out ${0.05 * index}s backwards`;

                const typeBadge = document.createElement('span');
                typeBadge.className = `type-badge ${type}`;
                typeBadge.textContent = getTypeBadgeLabel(type);

                const inner = document.createElement('div');
                inner.className = 'material-card-inner';

                const emojiEl = document.createElement('span');
                emojiEl.className = 'material-emoji';
                emojiEl.textContent = item.emoji || '📋';

                if (currentView === 'list') {
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'material-content';

                    const titleEl = document.createElement('div');
                    titleEl.className = 'material-title';
                    titleEl.textContent = item.title;

                    const badgeInline = document.createElement('span');
                    badgeInline.className = `type-badge ${type}`;
                    badgeInline.textContent = getTypeBadgeLabel(type);

                    contentDiv.appendChild(titleEl);
                    contentDiv.appendChild(badgeInline);
                    inner.appendChild(emojiEl);
                    inner.appendChild(contentDiv);
                } else {
                    const titleEl = document.createElement('div');
                    titleEl.className = 'material-title';
                    titleEl.textContent = item.title;

                    const typeEl = document.createElement('div');
                    typeEl.className = 'material-type';
                    typeEl.innerHTML = `<i class="fas fa-arrow-left"></i> פתח`;

                    inner.appendChild(emojiEl);
                    inner.appendChild(titleEl);
                    inner.appendChild(typeEl);
                    card.appendChild(typeBadge);
                }

                card.appendChild(inner);
                card.onclick = () => openMaterial(item.url);
                container.appendChild(card);
            });
        }

        function openMaterial(url) {
            if (!isValidUrl(url)) { alert('קישור לא תקין'); return; }
            const win = window.open(url, '_blank', 'noopener,noreferrer');
            if (win) win.opener = null;
        }

        function goBack() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = './index.html';
        }

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        window.addEventListener('load', loadMaterials);
    </script>
