<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://*.google.com https://*.googleusercontent.com https://script.google.com https://script.googleusercontent.com; frame-src https://drive.google.com;">

    <!-- Description & Icons -->
    <meta name="description" content="מערכת למידה רפואית - מדור רפואה, פיקוד העורף">
    <link rel="icon" type="image/png" href="Assets/logo1.PNG">
    <link rel="apple-touch-icon" href="Assets/logo1.PNG">
    <meta name="theme-color" content="#1a1d23">
    <meta name="apple-mobile-web-app-title" content="מדור רפואה">

    <title>לומדות | מדור רפואה</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Theme System -->
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>

    <style>
        :root {
            --orange-primary: #FF6B35;
            --orange-bright: #FF8C42;
            --orange-dark: #E85A24;
            --orange-glow: rgba(255, 107, 53, 0.4);
            --charcoal: #1a1d23;
            --charcoal-light: #252931;
            --charcoal-lighter: #2f343d;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --success: #22c55e;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--charcoal);
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .bg-image { position: fixed; inset: 0; background: url('Assets/background.JPEG') center center / cover no-repeat; z-index: 0; }
        .bg-overlay { position: fixed; inset: 0; background: linear-gradient(180deg, rgba(26, 29, 35, 0.85) 0%, rgba(26, 29, 35, 0.75) 30%, rgba(26, 29, 35, 0.85) 70%, rgba(26, 29, 35, 0.98) 100%); z-index: 1; }

        .main-container { position: relative; z-index: 10; min-height: 100vh; max-width: 600px; margin: 0 auto; padding-bottom: 90px; }

        /* Header */
        .header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(26, 29, 35, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .back-btn {
            width: 38px; height: 38px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .back-btn:active { transform: scale(0.95); }

        .page-title { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); }

        .header-actions { display: flex; align-items: center; gap: 10px; }
        .header-logos { display: flex; align-items: center; gap: 8px; }
        .header-logos img { height: 30px; width: auto; }

        /* Search Section */
        .search-section {
            padding: 12px 16px 8px;
            position: sticky;
            top: 66px;
            z-index: 99;
            background: linear-gradient(180deg, rgba(26, 29, 35, 0.95) 0%, rgba(26, 29, 35, 0.8) 80%, transparent 100%);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--charcoal-light);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 10px 14px;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--orange-primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .search-box i { color: var(--text-muted); font-size: 0.95rem; }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: 'Heebo', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: none;
            font-size: 0.9rem;
        }

        .search-clear.show { display: block; }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px 12px;
        }

        .video-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .video-count strong { color: var(--orange-primary); }

        .view-toggle {
            display: flex;
            gap: 4px;
        }

        .toggle-btn {
            width: 32px;
            height: 32px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .toggle-btn.active {
            background: var(--orange-primary);
            border-color: var(--orange-primary);
            color: white;
        }

        /* Category Tabs */
        .category-section {
            padding: 0 16px 12px;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 4px 0;
        }

        .category-tabs::-webkit-scrollbar { display: none; }

        .category-tab {
            flex-shrink: 0;
            padding: 8px 16px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Heebo', sans-serif;
        }

        .category-tab:active { transform: scale(0.97); }

        .category-tab.active {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            border-color: transparent;
            color: white;
        }

        .category-tab .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .category-tab.active .count {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Content Area */
        .content { padding: 0 16px 20px; }

        /* Recently Watched */
        .recent-section {
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i { color: var(--orange-primary); font-size: 0.9rem; }

        .clear-recent {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Heebo', sans-serif;
        }

        .recent-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 4px 0;
        }

        .recent-scroll::-webkit-scrollbar { display: none; }

        .recent-card {
            flex-shrink: 0;
            width: 140px;
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .recent-card:active {
            transform: scale(0.97);
            border-color: var(--orange-primary);
        }

        .recent-emoji {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .recent-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .video-grid.list-view {
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .video-card {
            background: var(--charcoal-light);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .video-card:active {
            transform: scale(0.98);
            border-color: var(--orange-primary);
        }

        .video-card-inner {
            padding: 16px 14px;
        }

        .video-emoji {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: block;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-play {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--orange-primary);
            font-weight: 600;
        }

        .video-play i { font-size: 0.7rem; }

        /* List View Card */
        .video-grid.list-view .video-card-inner {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
        }

        .video-grid.list-view .video-emoji {
            font-size: 1.8rem;
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .video-grid.list-view .video-content {
            flex: 1;
            min-width: 0;
        }

        .video-grid.list-view .video-title {
            margin-bottom: 4px;
            -webkit-line-clamp: 1;
        }

        .video-grid.list-view .video-play {
            margin-top: 0;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Loading */
        .loading-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--charcoal-lighter);
            border-top: 4px solid var(--orange-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-text { font-size: 1rem; color: var(--text-secondary); }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: #fca5a5;
            text-align: center;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 29, 35, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            min-width: 52px;
        }

        .bottom-nav-item i { font-size: 1.25rem; transition: all 0.3s ease; }
        .bottom-nav-item.active { color: var(--orange-primary); }
        .bottom-nav-item.active i { transform: scale(1.1); }
        .bottom-nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--orange-primary);
            border-radius: 0 0 3px 3px;
        }
        .bottom-nav-item:not(.active):active { color: var(--orange-primary); transform: scale(0.95); }
        .bottom-nav-item.active.instructor-tab { color: #818cf8; }
        .bottom-nav-item.active.instructor-tab::before { background: #818cf8; }

        @media (max-width: 380px) {
            .header { padding: 12px 14px; }
            .page-title { font-size: 1.1rem; }
            .header-logos img { height: 26px; }
            .search-section { padding: 10px 14px 6px; }
            .category-section { padding: 0 14px 10px; }
            .content { padding: 0 14px 16px; }
            .video-grid { gap: 10px; }
            .video-card-inner { padding: 14px 12px; }
            .video-emoji { font-size: 1.8rem; }
            .video-title { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="main-container">
        <header class="header">
            <div class="header-right">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <h1 class="page-title">לומדות</h1>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" onclick="ThemeManager.toggle()" title="מצב תצוגה">
                    <i class="fas fa-sun"></i>
                </button>
                <div class="header-logos">
                    <picture><source srcset="Assets/logo1.webp" type="image/webp"><img src="Assets/logo1_small.PNG" alt="Logo 1"></picture>
                    <picture><source srcset="Assets/logo2.webp" type="image/webp"><img src="Assets/logo2_small.PNG" alt="Logo 2"></picture>
                </div>
            </div>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="חיפוש סרטון...">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Stats & View Toggle -->
        <div class="stats-bar">
            <div class="video-count" id="videoCount">
                <strong>0</strong> סרטונים
            </div>
            <div class="stats-right">
                <span class="cache-age" id="cacheAge"></span>
                <button class="refresh-btn" id="refreshBtn" onclick="forceRefresh()" title="ריענון">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <div class="view-toggle">
                    <button class="toggle-btn active" id="gridBtn" onclick="setView('grid')">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button class="toggle-btn" id="listBtn" onclick="setView('list')">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-section">
            <div class="category-tabs" id="categoryTabs"></div>
        </div>

        <div class="content">
            <!-- Loading -->
            <div id="loadingScreen" class="loading-screen">
                <div class="loading-spinner"></div>
                <div class="loading-text">טוען סרטונים...</div>
            </div>

            <!-- Error -->
            <div id="errorScreen" style="display: none;">
                <div class="error-message">
                    <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
                    <div id="errorText">שגיאה בטעינת הסרטונים</div>
                </div>
            </div>

            <!-- Recently Watched -->
            <div class="recent-section" id="recentSection" style="display: none;">
                <div class="section-header">
                    <div class="section-title">
                        <i class="fas fa-history"></i>
                        נצפו לאחרונה
                    </div>
                    <button class="clear-recent" onclick="clearRecent()">נקה</button>
                </div>
                <div class="recent-scroll" id="recentScroll"></div>
            </div>

            <!-- Video Grid -->
            <div class="video-grid" id="videoGrid" style="display: none;"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">🔍</div>
                <div class="empty-title">לא נמצאו תוצאות</div>
                <div class="empty-text">נסה לחפש משהו אחר</div>
            </div>
        </div>
    </div>

    <script>
        const VIDEOS_URL = 'https://script.google.com/macros/s/AKfycbzT_F2coz6EOWSFER7dyRs9rq4NNLWDqTq2Xw2mQnpp3mvOS-4EKeNksK1JQrF_A3w/exec';
        const RECENT_KEY = 'lomdot_recent';
        const VIEW_KEY   = 'lomdot_view';
        const CACHE_KEY  = 'lomdot_cache';
        const CACHE_TTL  = 10 * 60 * 1000; // 10 minutes

        // ---- Cache helpers ----
        function saveCache(cacheKey, data) {
            try {
                localStorage.setItem(cacheKey, JSON.stringify(data));
                localStorage.setItem(cacheKey + '_ts', Date.now());
            } catch(e) {}
        }
        function loadCache(cacheKey, ttl) {
            const ts = parseInt(localStorage.getItem(cacheKey + '_ts') || '0');
            if (Date.now() - ts > ttl) return null;
            try { return JSON.parse(localStorage.getItem(cacheKey)); } catch(e) { return null; }
        }
        function showCacheAge(elId, cacheKey) {
            const ts = parseInt(localStorage.getItem(cacheKey + '_ts') || '0');
            if (!ts) { document.getElementById(elId).textContent = ''; return; }
            const mins = Math.round((Date.now() - ts) / 60000);
            document.getElementById(elId).textContent = mins < 1 ? 'עדכני' : 'לפני ' + mins + ' דק\'';
        }

        function forceRefresh() {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_KEY + '_ts');
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            loadVideos().finally(() => btn.classList.remove('spinning'));
        }

        let allVideos = [];
        let filteredVideos = [];
        let categories = [];
        let activeCategory = 'all';
        let currentView = localStorage.getItem(VIEW_KEY) || 'grid';

        function isValidUrl(url) {
            if (!url || typeof url !== 'string') return false;
            try {
                const urlObj = new URL(url);
                return urlObj.protocol === 'https:' &&
                       (urlObj.hostname === 'drive.google.com' ||
                        urlObj.hostname === 'script.google.com' ||
                        urlObj.hostname === 'script.googleusercontent.com' ||
                        urlObj.hostname === 'www.youtube.com' ||
                        urlObj.hostname === 'youtube.com' ||
                        urlObj.hostname === 'youtu.be');
            } catch (e) { return false; }
        }

        async function loadVideos() {
            const cached = loadCache(CACHE_KEY, CACHE_TTL);
            if (cached && cached.length > 0) {
                allVideos = cached;
                buildCategories();
                filteredVideos = [...allVideos];
                document.getElementById('loadingScreen').style.display = 'none';
                initUI();
                showCacheAge('cacheAge', CACHE_KEY);
                return;
            }
            try {
                const response = await fetch(VIDEOS_URL);
                if (!response.ok) throw new Error('שגיאת שרת');

                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'שגיאה');

                allVideos = data.videos
                    .filter(v => v.title && v.title.trim() !== '' && v.url)
                    .filter(v => isValidUrl(v.url))
                    .map((v, i) => ({
                        id: i,
                        title: String(v.title).substring(0, 200),
                        emoji: String(v.emoji || '🎥').substring(0, 10),
                        url: v.url
                    }));

                if (allVideos.length === 0) throw new Error('לא נמצאו סרטונים');

                saveCache(CACHE_KEY, allVideos);
                buildCategories();
                filteredVideos = [...allVideos];

                document.getElementById('loadingScreen').style.display = 'none';
                initUI();
                showCacheAge('cacheAge', CACHE_KEY);

            } catch (error) {
                showError('לא ניתן לטעון את הסרטונים כרגע');
            }
        }

        function buildCategories() {
            const emojiCount = {};
            allVideos.forEach(v => {
                const emoji = v.emoji;
                emojiCount[emoji] = (emojiCount[emoji] || 0) + 1;
            });

            categories = Object.entries(emojiCount)
                .sort((a, b) => b[1] - a[1])
                .map(([emoji, count]) => ({ emoji, count }));
        }

        function initUI() {
            renderCategories();
            renderRecent();
            setView(currentView);
            renderVideos();
            updateCount();

            document.getElementById('searchInput').addEventListener('input', handleSearch);
        }

        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            container.textContent = '';

            // All tab
            const allTab = document.createElement('button');
            allTab.className = 'category-tab active';
            allTab.onclick = () => filterByCategory('all');

            const allText = document.createTextNode('הכל ');
            const allCount = document.createElement('span');
            allCount.className = 'count';
            allCount.textContent = allVideos.length;

            allTab.appendChild(allText);
            allTab.appendChild(allCount);
            allTab.dataset.category = 'all';
            container.appendChild(allTab);

            // Category tabs
            categories.forEach(cat => {
                const tab = document.createElement('button');
                tab.className = 'category-tab';
                tab.onclick = () => filterByCategory(cat.emoji);

                const emoji = document.createTextNode(cat.emoji + ' ');
                const count = document.createElement('span');
                count.className = 'count';
                count.textContent = cat.count;

                tab.appendChild(emoji);
                tab.appendChild(count);
                tab.dataset.category = cat.emoji;
                container.appendChild(tab);
            });
        }

        function filterByCategory(category) {
            activeCategory = category;

            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });

            applyFilters();
        }

        function handleSearch(e) {
            const query = e.target.value.trim();
            document.getElementById('searchClear').classList.toggle('show', query.length > 0);
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').classList.remove('show');
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();

            filteredVideos = allVideos.filter(v => {
                const matchCategory = activeCategory === 'all' || v.emoji === activeCategory;
                const matchSearch = !query || v.title.toLowerCase().includes(query);
                return matchCategory && matchSearch;
            });

            renderVideos();
            updateCount();
        }

        function updateCount() {
            const countEl = document.getElementById('videoCount');
            countEl.textContent = '';

            const strong = document.createElement('strong');
            strong.textContent = filteredVideos.length;

            countEl.appendChild(strong);
            countEl.appendChild(document.createTextNode(' סרטונים'));
        }

        function setView(view) {
            currentView = view;
            localStorage.setItem(VIEW_KEY, view);

            document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
            document.getElementById('listBtn').classList.toggle('active', view === 'list');

            const grid = document.getElementById('videoGrid');
            grid.classList.toggle('list-view', view === 'list');
        }

        function renderVideos() {
            const container = document.getElementById('videoGrid');
            const emptyState = document.getElementById('emptyState');

            container.textContent = '';

            if (filteredVideos.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.style.display = 'grid';

            filteredVideos.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.style.animation = `fadeIn 0.3s ease ${index * 0.03}s backwards`;
                card.onclick = () => openVideo(video);

                const inner = document.createElement('div');
                inner.className = 'video-card-inner';

                const emoji = document.createElement('span');
                emoji.className = 'video-emoji';
                emoji.textContent = video.emoji;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'video-content';

                const title = document.createElement('div');
                title.className = 'video-title';
                title.textContent = video.title;

                const play = document.createElement('div');
                play.className = 'video-play';

                const playIcon = document.createElement('i');
                playIcon.className = 'fas fa-play';

                play.appendChild(playIcon);
                play.appendChild(document.createTextNode(' צפה עכשיו'));

                if (currentView === 'list') {
                    contentDiv.appendChild(title);
                    contentDiv.appendChild(play);
                    inner.appendChild(emoji);
                    inner.appendChild(contentDiv);
                } else {
                    inner.appendChild(emoji);
                    inner.appendChild(title);
                    inner.appendChild(play);
                }

                card.appendChild(inner);
                container.appendChild(card);
            });
        }

        function renderRecent() {
            const section = document.getElementById('recentSection');
            const container = document.getElementById('recentScroll');
            const recent = getRecent();

            if (recent.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            container.textContent = '';

            recent.forEach(video => {
                const card = document.createElement('div');
                card.className = 'recent-card';
                card.onclick = () => openVideo(video);

                const emoji = document.createElement('div');
                emoji.className = 'recent-emoji';
                emoji.textContent = video.emoji;

                const title = document.createElement('div');
                title.className = 'recent-title';
                title.textContent = video.title;

                card.appendChild(emoji);
                card.appendChild(title);
                container.appendChild(card);
            });
        }

        function getRecent() {
            try {
                const data = localStorage.getItem(RECENT_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) { return []; }
        }

        function addToRecent(video) {
            let recent = getRecent();
            recent = recent.filter(v => v.id !== video.id);
            recent.unshift(video);
            recent = recent.slice(0, 10);
            localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
        }

        function clearRecent() {
            localStorage.removeItem(RECENT_KEY);
            document.getElementById('recentSection').style.display = 'none';
        }

        function openVideo(video) {
            if (!isValidUrl(video.url)) {
                alert('קישור לא תקין');
                return;
            }
            addToRecent(video);
            renderRecent();
            const newWindow = window.open(video.url, '_blank', 'noopener,noreferrer');
            if (newWindow) newWindow.opener = null;
        }

        function showError(message) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }

        function goBack() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = './index.html';
        }

        window.addEventListener('load', loadVideos);
    </script>
